<h1 id="tableLabel">Weather forecast</h1>

<p>This component demonstrates fetching data from the server.</p>

<p *ngIf="!weatherData"><em>Loading...</em></p>

<table class='table table-striped' aria-labelledby="tableLabel" *ngIf="weatherData">
  <thead>
    <tr>
      <th>Date</th>
      <th>Temp. (C)</th>
      <th>Temp. (F)</th>
      <th>Summary</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let weather of weatherData">
      <td>{{ weather.date }}</td>
      <td>{{ weather.temperatureC }}</td>
      <td>{{ weather.temperatureF }}</td>
      <td>{{ weather.summary }}</td>
    </tr>
  </tbody>
</table>
